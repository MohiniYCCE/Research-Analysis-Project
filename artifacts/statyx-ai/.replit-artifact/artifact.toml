kind = "web"
previewPath = "/"
title = "Statyx AI"
version = "1.0.0"
id = "artifacts/statyx-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23845

[services.development]
run = "pnpm --filter @workspace/statyx-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/statyx-ai", "run", "build" ]
publicDir = "artifacts/statyx-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23845"
BASE_PATH = "/"
